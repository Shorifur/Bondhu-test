version: "3.9"

services:
  # ── Application Database (Primary) ───────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bondhu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bondhu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bondhu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bondhu}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "work_mem=20MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "log_statement=mod"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bondhu -d bondhu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bondhu-network

  # ── Connection Pooler ────────────────────────────────────────────
  pgbouncer:
    image: pgbouncer/pgbouncer:1.22
    container_name: bondhu-pgbouncer
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DATABASE: bondhu
      DATABASES_USER: bondhu
      DATABASES_PASSWORD: bondhu_secret
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 10000
      DEFAULT_POOL_SIZE: 100
      MIN_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 25
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 400
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bondhu-network

  # ── Cache & Session Layer ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bondhu-redis
    restart: unless-stopped
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bondhu-network

  # ── Redis Sentinel (Production HA) ───────────────────────────────
  redis-sentinel:
    image: redis:7-alpine
    container_name: bondhu-redis-sentinel
    restart: unless-stopped
    command: >
      sh -c "echo 'sentinel monitor bondhu-master redis 6379 2' > /etc/sentinel.conf &&
             echo 'sentinel down-after-milliseconds bondhu-master 5000' >> /etc/sentinel.conf &&
             echo 'sentinel failover-timeout bondhu-master 10000' >> /etc/sentinel.conf &&
             redis-sentinel /etc/sentinel.conf"
    ports:
      - "26379:26379"
    depends_on:
      - redis
    networks:
      - bondhu-network

  # ── Object Storage (MinIO for dev) ───────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: bondhu-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bondhu}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bondhu_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - bondhu-network

  # ── Message Queue (for background jobs) ──────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: bondhu-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-bondhu}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-bondhu_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bondhu-network

  # ── Search Engine (Elasticsearch) ────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: bondhu-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - bondhu-network

  # ── Reverse Proxy / Load Balancer (dev) ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bondhu-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - bondhu-network

  # ── API Service (NestJS) ─────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: bondhu-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://bondhu:bondhu_secret@pgbouncer:6432/bondhu?schema=public&pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://bondhu:bondhu_secret@postgres:5432/bondhu?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://bondhu:bondhu_secret@rabbitmq:5672
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: bondhu
      MINIO_SECRET_KEY: bondhu_secret
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OTP_SECRET: ${OTP_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bondhu-network

  # ── Web Client (Next.js) ─────────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: bondhu-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_MINIO_URL: http://localhost:9000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - bondhu-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  es_data:

networks:
  bondhu-network:
    driver: bridge
